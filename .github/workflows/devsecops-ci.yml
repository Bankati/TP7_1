name: devsecops-ci

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  quality-and-tests:
    name: Quality and Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: Run tests
        run: npm test

  sca-dependency-scan:
    name: SCA Dependency Scan
    runs-on: ubuntu-latest
    needs: quality-and-tests
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: NPM Audit (High and Critical)
        run: npm audit --audit-level=high

  trivy-scan:
    name: Trivy Filesystem Scan
    runs-on: ubuntu-latest
    needs: quality-and-tests
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Run Trivy scanner
        uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: fs
          scan-ref: .
          vuln-type: "os,library"
          severity: "HIGH,CRITICAL"
          ignore-unfixed: true
          format: table
          exit-code: "1"

  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    needs: quality-and-tests
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
